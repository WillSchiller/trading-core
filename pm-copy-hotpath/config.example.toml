# Copy to `config.toml`, `pm-hotpath.toml`, or `config/pm-hotpath.toml`; override with env `PM_HOTPATH_*` (nested keys use `__`).

feed_mode = "rtds_activity" # or "clob_market_telemetry"
rtds_ws_url = "wss://ws-live-data.polymarket.com"
clob_ws_base_url = "wss://ws-subscriptions-clob.polymarket.com"
clob_http_url = "https://clob.polymarket.com"
gamma_http_url = "https://gamma-api.polymarket.com"

score_threshold = 0.5
copy_size_usd = 25.0
min_entry_price = 0.15
max_entry_price = 0.85

traders_json_path = "traders.json"

# CLOB telemetry only (no copy triggers — see WS_SCHEMA.md)
asset_ids = []
custom_feature_enabled = false

dry_run = true
signature_type = 0
