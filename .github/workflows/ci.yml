name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# EC2 production deploy is `.github/workflows/deploy.yml` (push to main or workflow_dispatch).
# It expects AWS + ECR secrets; see comments at the top of that file.

jobs:
  lint-and-typecheck:
    name: Lint and Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type checking
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dislocation_trader_test
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: dislocation_trader_test
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: testpassword
        run: npm run test:integration

  rust-pm-copy-hotpath:
    name: Rust pm-copy-hotpath
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust (MSRV for polymarket-client-sdk)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            pm-copy-hotpath

      - name: fmt, clippy, test
        working-directory: pm-copy-hotpath
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, rust-pm-copy-hotpath]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: dislocation-trader:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
