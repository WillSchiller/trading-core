name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    branches:
      - main

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: dislocation-trader-production
  INSTANCE_NAME: dislocation-trader-production

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker
        id: meta
        run: |
          echo "tags=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "latest=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.INSTANCE_NAME }}" \
            "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          INSTANCE_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "instance-id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "instance-ip=$INSTANCE_IP" >> $GITHUB_OUTPUT

      - name: Upload deployment files via S3
        run: |
          aws s3 cp docker/docker-compose.prod.yml s3://blockhelixasia/deploy/docker-compose.prod.yml
          aws s3 cp scripts/fetch-secrets.sh s3://blockhelixasia/deploy/fetch-secrets.sh
          aws s3 cp scripts/deploy.sh s3://blockhelixasia/deploy/deploy.sh
          aws s3 sync grafana/ s3://blockhelixasia/deploy/grafana/ --delete
          aws s3 sync sql/ s3://blockhelixasia/deploy/sql/ --delete

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ steps.get-instance.outputs.instance-id }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"aws s3 cp s3://blockhelixasia/deploy/deploy.sh /tmp/deploy.sh\",
              \"chmod +x /tmp/deploy.sh\",
              \"export AWS_REGION=${{ env.AWS_REGION }}\",
              \"export PROJECT_NAME=dislocation-trader\",
              \"export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}\",
              \"export ECR_REPOSITORY_URL=${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}\",
              \"export IMAGE_TAG=${{ github.sha }}\",
              \"bash /tmp/deploy.sh\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Wait for command to complete
          for i in {1..60}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE_ID \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful!"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id $INSTANCE_ID \
                --query 'StandardOutputContent' \
                --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deployment failed!"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id $INSTANCE_ID \
                --query '[StandardOutputContent, StandardErrorContent]' \
                --output text
              exit 1
            fi

            sleep 5
          done

          echo "Deployment timed out"
          exit 1

      - name: Health check
        run: |
          sleep 30
          INSTANCE_IP=${{ steps.get-instance.outputs.instance-ip }}

          echo "Checking Grafana at http://$INSTANCE_IP:3000..."
          if curl -sf --max-time 10 http://$INSTANCE_IP:3000/api/health; then
            echo "Grafana is healthy"
          else
            echo "Grafana health check failed (may still be starting)"
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance:** ${{ steps.get-instance.outputs.instance-id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **IP:** ${{ steps.get-instance.outputs.instance-ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Grafana:** http://${{ steps.get-instance.outputs.instance-ip }}:3000" >> $GITHUB_STEP_SUMMARY
