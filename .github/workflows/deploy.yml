name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: dislocation-trader-production

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker
        id: meta
        run: |
          echo "tags=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "latest=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 instance IP
        id: get-ip
        run: |
          INSTANCE_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=dislocation-trader-production" \
            "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "instance-ip=$INSTANCE_IP" >> $GITHUB_OUTPUT

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ steps.get-ip.outputs.instance-ip }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          INSTANCE_IP: ${{ steps.get-ip.outputs.instance-ip }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@$INSTANCE_IP << 'EOF'
            set -e

            cd /home/ubuntu/app

            export AWS_REGION=${{ env.AWS_REGION }}
            export PROJECT_NAME=dislocation-trader

            source /home/ubuntu/app/scripts/fetch-secrets.sh export

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            export ECR_REPOSITORY_URL=${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
            export IMAGE_TAG=${{ github.sha }}
            export PUBLIC_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)

            source .env.secrets

            docker-compose -f docker/docker-compose.prod.yml pull

            docker-compose -f docker/docker-compose.prod.yml up -d

            echo "Running database migrations..."
            docker exec dislocation-trader-app npm run db:migrate || true

            docker-compose -f docker/docker-compose.prod.yml ps

            echo "Deployment completed successfully"
          EOF

      - name: Health check
        run: |
          sleep 30
          INSTANCE_IP=${{ steps.get-ip.outputs.instance-ip }}

          if curl -f http://$INSTANCE_IP:3000/api/health; then
            echo "Grafana health check passed"
          else
            echo "Grafana health check failed"
            exit 1
          fi

      - name: Send deployment notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MESSAGE="✅ Deployment to ${{ github.event.inputs.environment || 'production' }} successful"
          else
            MESSAGE="❌ Deployment to ${{ github.event.inputs.environment || 'production' }} failed"
          fi

          echo "Deployment status: $MESSAGE"
