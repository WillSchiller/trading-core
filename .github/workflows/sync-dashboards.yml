name: Sync Grafana Dashboards

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no changes detected'
        required: false
        default: 'false'
        type: boolean
  push:
    branches:
      - main
    paths:
      - 'grafana/dashboards/**'
      - 'grafana/provisioning/**'

env:
  AWS_REGION: eu-west-1
  INSTANCE_NAME: dislocation-trader-production
  S3_BUCKET: blockhelixasia

jobs:
  sync-dashboards:
    name: Sync Dashboards to AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.INSTANCE_NAME }}" \
            "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No running instance found with name ${{ env.INSTANCE_NAME }}"
            exit 1
          fi

          INSTANCE_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

          echo "instance-id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "instance-ip=$INSTANCE_IP" >> $GITHUB_OUTPUT
          echo "Found instance: $INSTANCE_ID at $INSTANCE_IP"

      - name: Upload dashboards to S3
        run: |
          echo "Syncing grafana/ to S3..."
          aws s3 sync grafana/ s3://${{ env.S3_BUCKET }}/deploy/grafana/ --delete

          echo "Files uploaded:"
          aws s3 ls s3://${{ env.S3_BUCKET }}/deploy/grafana/ --recursive

      - name: Sync dashboards to EC2 via SSM
        env:
          INSTANCE_ID: ${{ steps.get-instance.outputs.instance-id }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"cd /home/ubuntu/app\",
              \"echo '=== Syncing Grafana dashboards ===' \",
              \"mkdir -p grafana/provisioning grafana/dashboards\",
              \"aws s3 sync s3://${{ env.S3_BUCKET }}/deploy/grafana/ grafana/ --delete\",
              \"echo '=== Dashboard files ===' \",
              \"ls -la grafana/dashboards/\",
              \"echo '=== Restarting Grafana to reload dashboards ===' \",
              \"docker restart dislocation-grafana || true\",
              \"sleep 5\",
              \"echo '=== Grafana status ===' \",
              \"docker ps | grep grafana || echo 'Grafana container not found'\",
              \"echo '=== Sync complete ===' \"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "Command ID: $COMMAND_ID"

          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE_ID \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Dashboard sync successful!"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id $INSTANCE_ID \
                --query 'StandardOutputContent' \
                --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Dashboard sync failed!"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id $INSTANCE_ID \
                --query '[StandardOutputContent, StandardErrorContent]' \
                --output text
              exit 1
            fi

            sleep 2
          done

          echo "Dashboard sync timed out"
          exit 1

      - name: Verify Grafana health
        run: |
          INSTANCE_IP=${{ steps.get-instance.outputs.instance-ip }}

          echo "Waiting for Grafana to be ready..."
          sleep 10

          echo "Checking Grafana at http://$INSTANCE_IP:3000..."
          if curl -sf --max-time 10 http://$INSTANCE_IP:3000/api/health; then
            echo ""
            echo "Grafana is healthy!"
          else
            echo "Grafana health check failed (may still be starting)"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Dashboard Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance:** ${{ steps.get-instance.outputs.instance-id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **IP:** ${{ steps.get-instance.outputs.instance-ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Grafana:** http://${{ steps.get-instance.outputs.instance-ip }}:3000" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Dashboards Synced" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -la grafana/dashboards/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No dashboards found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
