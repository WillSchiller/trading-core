version: '3.8'

services:
  app:
    image: ${ECR_REPOSITORY_URL}:${IMAGE_TAG:-latest}
    container_name: dislocation-trader-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: dislocation_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # RPC vars removed — observatory mode doesn't need chain providers
      # Re-add when DEX reading or on-chain execution is re-enabled

      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
      COINBASE_API_KEY: ${COINBASE_API_KEY}
      COINBASE_API_SECRET: ${COINBASE_API_SECRET}
      COINBASE_PASSPHRASE: ${COINBASE_PASSPHRASE}

      # EXECUTOR_PRIVATE_KEY and HYPERLIQUID_PRIVATE_KEY removed — observatory mode
      HYPERLIQUID_PRIVATE_KEY: ${HYPERLIQUID_PRIVATE_KEY:-}

      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}

      PAPER_MODE: ${PAPER_MODE:-true}
      ENABLE_EXECUTION: ${ENABLE_EXECUTION:-false}
      ENABLE_BASE: ${ENABLE_BASE:-false}
      ENABLE_MAINNET: ${ENABLE_MAINNET:-false}

      PAPER_MM_ENABLED: ${PAPER_MM_ENABLED:-true}
      MM_ASSETS: ${MM_ASSETS:-kPEPE,ARB,POPCAT,MOODENG,SAGA,DYM,MEME,MANTA,IO}
      MM_POSITION_SIZE_USD: ${MM_POSITION_SIZE_USD:-200}
      MM_MAX_INVENTORY_USD: ${MM_MAX_INVENTORY_USD:-500}
      MM_OFI_THRESHOLD: ${MM_OFI_THRESHOLD:-0.85}
      MM_MIN_SPREAD_BPS: ${MM_MIN_SPREAD_BPS:-3}

      FUNDING_ARB_ENABLED: ${FUNDING_ARB_ENABLED:-true}
      FUNDING_ARB_PAPER: ${FUNDING_ARB_PAPER:-true}
      FUNDING_ARB_MAX_POSITIONS: ${FUNDING_ARB_MAX_POSITIONS:-3}
      FUNDING_ARB_POSITION_SIZE_USD: ${FUNDING_ARB_POSITION_SIZE_USD:-150}
      FUNDING_ARB_LEVERAGE: ${FUNDING_ARB_LEVERAGE:-10}
      FUNDING_ARB_MIN_APY: ${FUNDING_ARB_MIN_APY:-5}
      FUNDING_ARB_ASSETS: ${FUNDING_ARB_ASSETS:-}
      FUNDING_ARB_MAX_BREAKEVEN_HOURS: ${FUNDING_ARB_MAX_BREAKEVEN_HOURS:-48}

      PMM_ENABLED: ${PMM_ENABLED:-true}
      PMM_PAPER_MODE: ${PMM_PAPER_MODE:-true}
      PMM_MAX_MARKETS: ${PMM_MAX_MARKETS:-5}
      PMM_POSITION_SIZE_USD: ${PMM_POSITION_SIZE_USD:-50}
      PMM_MAX_INVENTORY_USD: ${PMM_MAX_INVENTORY_USD:-100}
      PMM_MAX_TOTAL_EXPOSURE_USD: ${PMM_MAX_TOTAL_EXPOSURE_USD:-500}
      PMM_MIN_SPREAD_CENTS: ${PMM_MIN_SPREAD_CENTS:-2}
      PMM_GAMMA: ${PMM_GAMMA:-0.3}
      PMM_MIN_VOLUME_24H: ${PMM_MIN_VOLUME_24H:-50000}
      PMM_EXIT_BEFORE_RESOLUTION_H: ${PMM_EXIT_BEFORE_RESOLUTION_H:-6}

      POLYMARKET_ENABLED: ${POLYMARKET_ENABLED:-true}
      # Set to false when running Rust `pm-hotpath` so only one process copies RTDS → CLOB
      PM_NODE_COPY_TRADER: ${PM_NODE_COPY_TRADER:-true}
      # Rust handles buys — Node only does sells/resolution/price updates
      PM_NODE_SKIP_BUYS: ${PM_NODE_SKIP_BUYS:-true}
      POLYMARKET_PAPER_MODE: ${POLYMARKET_PAPER_MODE:-false}
      POLYMARKET_BANKROLL_USD: ${POLYMARKET_BANKROLL_USD:-76}
      POLYMARKET_MAX_POSITION_USD: ${POLYMARKET_MAX_POSITION_USD:-1}
      POLYMARKET_MAX_EXPOSURE_USD: ${POLYMARKET_MAX_EXPOSURE_USD:-500}
      POLYMARKET_DAILY_LOSS_LIMIT_USD: ${POLYMARKET_DAILY_LOSS_LIMIT_USD:-99999}
      POLYMARKET_MAX_MARKETS_OPEN: ${POLYMARKET_MAX_MARKETS_OPEN:-999}
      POLYMARKET_MAX_TRADERS: ${POLYMARKET_MAX_TRADERS:-500}
      POLYMARKET_PRIVATE_KEY: ${POLYMARKET_PRIVATE_KEY:-}
      POLYMARKET_API_KEY: ${POLYMARKET_API_KEY:-}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-}
      POLYMARKET_FUNDER_ADDRESS: ${POLYMARKET_FUNDER_ADDRESS:-0x6A5cAc3e4B85D546B24278fCbf98D26C33C8444C}
      POLYMARKET_SIGNATURE_TYPE: ${POLYMARKET_SIGNATURE_TYPE:-2}
      PM_DISCOVERY_CATEGORIES: ${PM_DISCOVERY_CATEGORIES:-SPORTS,CRYPTO,POLITICS}
      PM_COPY_CATEGORIES: ${PM_COPY_CATEGORIES:-SPORTS,CRYPTO,POLITICS}
      # Filter v1: strict lifetime, no recency (FILTER_VERSION=1, RECENCY_WINDOW=0)
      # Filter v2: loose lifetime + recency gate (FILTER_VERSION=2, RECENCY_WINDOW=20)
      PM_FILTER_VERSION: ${PM_FILTER_VERSION:-2}
      PM_RECENCY_WINDOW: ${PM_RECENCY_WINDOW:-20}
      PM_RECENCY_MIN_PF: ${PM_RECENCY_MIN_PF:-0.8}
      PM_RECENCY_MIN_WR: ${PM_RECENCY_MIN_WR:-0.40}
      # ML scorer: set PM_MIN_SCORE=0 to disable, 0.5-0.8 for scoring
      # PM_SCORER_MODEL: win | capital | kelly (kelly uses calibrated probs + Kelly criterion)
      # ML scoring disabled — collecting fill rate data with simple $1 orders
      PM_MIN_SCORE: ${PM_MIN_SCORE:-0}
      PM_SCORER_MODEL: ${PM_SCORER_MODEL:-win}
      PM_MIN_BET_USD: ${PM_MIN_BET_USD:-1}
      # Kelly multiplier: 0.1 for $5k+, 0.5 for $1k, 1.0 for $100-500
      PM_KELLY_MULTIPLIER: ${PM_KELLY_MULTIPLIER:-1.0}
      PM_MIN_TRADES: ${PM_MIN_TRADES:-50}
      PM_MIN_ACTIVE_DAYS: ${PM_MIN_ACTIVE_DAYS:-14}
      PM_MIN_SHARPE: ${PM_MIN_SHARPE:-0.05}
      PM_MIN_PROFIT_FACTOR: ${PM_MIN_PROFIT_FACTOR:-1.3}
      PM_MAX_DD_RATIO: ${PM_MAX_DD_RATIO:-0.5}
      PM_TRADER_MAX_CONSEC_LOSS: ${PM_TRADER_MAX_CONSEC_LOSS:-5}
      PM_TRADER_MAX_LOSS: ${PM_TRADER_MAX_LOSS:-200}
      PM_RECENCY_HALFLIFE: ${PM_RECENCY_HALFLIFE:-0.2}
      PM_MIN_COINFLIP_WR: ${PM_MIN_COINFLIP_WR:-0.55}
      PM_MIN_ENTRY_PRICE: ${PM_MIN_ENTRY_PRICE:-0.15}
      PM_MAX_ENTRY_PRICE: ${PM_MAX_ENTRY_PRICE:-0.85}
    # Config is baked into the Docker image (not volume-mounted) to ensure
    # config and code are always in sync. The Dockerfile COPY includes config/.
    # SQL migrations are still mounted for flexibility.
    volumes:
      - ../sql:/app/sql:ro
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Rust RTDS → CLOB hot path. Config baked into image (pm-hotpath.toml).
  # Env vars here are secrets only. Use PM_NODE_COPY_TRADER=false on `app`.
  pm-hotpath:
    profiles:
      - pm-hotpath
    image: ${ECR_REPOSITORY_URL}:${IMAGE_TAG:-latest}
    container_name: dislocation-pm-hotpath
    restart: unless-stopped
    command: ["/usr/local/bin/pm-copy-hotpath"]
    working_dir: /app/pm-hotpath
    environment:
      RUST_LOG: ${PM_HOTPATH_LOG:-info,pm_copy_hotpath=debug}
      POLYMARKET_PRIVATE_KEY: ${POLYMARKET_PRIVATE_KEY:-}
      PM_HOTPATH_DATABASE_URL: postgresql://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-dislocation_trader}
      ORT_DYLIB_PATH: /app/node_modules/onnxruntime-node/bin/napi-v6/linux/x64/libonnxruntime.so.1
    volumes:
      - ../pm-hotpath/traders.json:/app/pm-hotpath/traders.json:ro
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  postgres:
    image: postgres:16-alpine
    container_name: dislocation-postgres
    restart: always
    environment:
      POSTGRES_DB: dislocation_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d dislocation_trader"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256m
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=32MB
      -c huge_pages=off
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_connections=50

  grafana:
    image: grafana/grafana:10.2.3
    container_name: dislocation-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://${PUBLIC_IP}:3000
      GF_INSTALL_PLUGINS: ""
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  app-network:
    driver: bridge

volumes:
  grafana_data:
    driver: local
