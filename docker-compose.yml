services:
  postgres:
    image: postgres:16-alpine
    container_name: dislocation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dislocation_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d dislocation_trader"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.2.3
    container_name: dislocation-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    container_name: dislocation-trader
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: dislocation_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      RPC_BASE_HTTP: ${RPC_BASE_HTTP:-}
      RPC_BASE_WS: ${RPC_BASE_WS:-}
      RPC_MAINNET_HTTP: ${RPC_MAINNET_HTTP:-}
      RPC_MAINNET_WS: ${RPC_MAINNET_WS:-}
      RPC_DRPC_BASE_HTTP: ${RPC_DRPC_BASE_HTTP:-}
      RPC_DRPC_BASE_WS: ${RPC_DRPC_BASE_WS:-}
      RPC_DRPC_MAINNET_HTTP: ${RPC_DRPC_MAINNET_HTTP:-}
      RPC_DRPC_MAINNET_WS: ${RPC_DRPC_MAINNET_WS:-}
      RPC_ALCHEMY_BASE_HTTP: ${RPC_ALCHEMY_BASE_HTTP:-}
      RPC_ALCHEMY_BASE_WS: ${RPC_ALCHEMY_BASE_WS:-}
      RPC_ALCHEMY_MAINNET_HTTP: ${RPC_ALCHEMY_MAINNET_HTTP:-}
      RPC_ALCHEMY_MAINNET_WS: ${RPC_ALCHEMY_MAINNET_WS:-}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      COINBASE_API_KEY: ${COINBASE_API_KEY:-}
      COINBASE_API_SECRET: ${COINBASE_API_SECRET:-}
      COINBASE_PASSPHRASE: ${COINBASE_PASSPHRASE:-}
      BYBIT_API_KEY: ${BYBIT_API_KEY:-}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET:-}
      EXECUTOR_PRIVATE_KEY: ${EXECUTOR_PRIVATE_KEY:-}
      PAPER_MODE: ${PAPER_MODE:-true}
      PAPER_MM_ENABLED: ${PAPER_MM_ENABLED:-false}
      MM_ASSETS: ${MM_ASSETS:-kPEPE,ARB,POPCAT,MOODENG,SAGA,DYM,MEME,MANTA,IO}
      MM_POSITION_SIZE_USD: ${MM_POSITION_SIZE_USD:-200}
      MM_MAX_INVENTORY_USD: ${MM_MAX_INVENTORY_USD:-500}
      ENABLE_EXECUTION: ${ENABLE_EXECUTION:-false}
      ENABLE_BASE: ${ENABLE_BASE:-true}
      ENABLE_MAINNET: ${ENABLE_MAINNET:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      POLYMARKET_ENABLED: ${POLYMARKET_ENABLED:-false}
      POLYMARKET_PAPER_MODE: ${POLYMARKET_PAPER_MODE:-true}
      POLYMARKET_PRIVATE_KEY: ${POLYMARKET_PRIVATE_KEY:-}
      POLYMARKET_BANKROLL_USD: ${POLYMARKET_BANKROLL_USD:-500}
      POLYMARKET_MAX_POSITION_USD: ${POLYMARKET_MAX_POSITION_USD:-100}
      POLYMARKET_MAX_EXPOSURE_USD: ${POLYMARKET_MAX_EXPOSURE_USD:-500}
      POLYMARKET_DAILY_LOSS_LIMIT_USD: ${POLYMARKET_DAILY_LOSS_LIMIT_USD:-50}
      POLYMARKET_MAX_MARKETS_OPEN: ${POLYMARKET_MAX_MARKETS_OPEN:-10}
      POLYMARKET_MAX_TRADERS: ${POLYMARKET_MAX_TRADERS:-30}
      PM_MIN_TRADES: ${PM_MIN_TRADES:-50}
      PM_MIN_ACTIVE_DAYS: ${PM_MIN_ACTIVE_DAYS:-14}
      PM_MIN_SHARPE: ${PM_MIN_SHARPE:-0.05}
      PM_MIN_PROFIT_FACTOR: ${PM_MIN_PROFIT_FACTOR:-1.3}
      PM_MAX_DD_RATIO: ${PM_MAX_DD_RATIO:-0.5}
      PM_TRADER_MAX_CONSEC_LOSS: ${PM_TRADER_MAX_CONSEC_LOSS:-5}
      PM_TRADER_MAX_LOSS: ${PM_TRADER_MAX_LOSS:-200}
      PM_RECENCY_HALFLIFE: ${PM_RECENCY_HALFLIFE:-0.2}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  grafana_data:
